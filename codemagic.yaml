workflows:
  android-zip-build:
    name: Build Android APK from ZIP
    instance_type: mac_mini_m1
    scripts:
      - name: Extract ZIP files
        script: |
          unzip -o ShiftAir.zip
          if [ -d "ShiftAir" ]; then
            cp -rn ShiftAir/* . || true
          fi
      - name: Generate Gradle Wrapper and Build APK
        script: |
          # Tengeneza gradlew iwapo haipo
          gradle wrapper
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - "**/build/outputs/**/*.apk"
