workflows:
  android-zip-build:
    name: Build Android APK from ZIP
    instance_type: mac_mini_m1
    scripts:
      - name: Extract ZIP files
        script: |
          unzip -o ShiftAir.zip
          cp -rn ShiftAir/* . || true
          chmod +x gradlew || true
      - name: Build Android APK
        script: |
          if [ -f "./gradlew" ]; then
            ./gradlew assembleDebug
          else
            cd ShiftAir && chmod +x gradlew && ./gradlew assembleDebug
          fi
    artifacts:
      - "**/build/outputs/**/*.apk"
